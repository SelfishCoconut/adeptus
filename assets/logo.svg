<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" fill="none" role="img" aria-label="Adeptus">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06140d"/>
      <stop offset="0.55" stop-color="#0a1f15"/>
      <stop offset="1" stop-color="#04110a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#16a34a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="280" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="278" rx="27" fill="none" stroke="#14532d" stroke-width="1.5"/>
  <ellipse cx="170" cy="140" rx="200" ry="160" fill="url(#glow)"/>

  <!-- knowledge-graph motif -->
  <g stroke="#1f5135" stroke-width="1.5" opacity="0.8">
    <line x1="820" y1="60" x2="890" y2="110"/>
    <line x1="890" y1="110" x2="850" y2="190"/>
    <line x1="850" y1="190" x2="770" y2="210"/>
    <line x1="820" y1="60" x2="770" y2="210"/>
    <line x1="890" y1="110" x2="912" y2="180"/>
  </g>
  <g fill="#22c55e">
    <circle cx="820" cy="60" r="5"/>
    <circle cx="890" cy="110" r="6" fill="#4ade80"/>
    <circle cx="850" cy="190" r="5"/>
    <circle cx="770" cy="210" r="4" fill="#86efac"/>
    <circle cx="912" cy="180" r="4" fill="#4ade80"/>
  </g>

  <!-- green shield with the Adeptus bolt on the face -->
  <g transform="translate(95 64) scale(6.25)">
    <path fill="url(#shield)" stroke="#bbf7d0" stroke-width="0.22" stroke-linejoin="round"
          d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
    <g transform="translate(6.25 6.35) scale(0.243)" fill="#ffffff" opacity="0.95">
      <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="300" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="6" fill="url(#word)">ADEPTUS</text>
  <text x="304" y="196" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" font-weight="500" letter-spacing="1.5" fill="#7fcfa0">Locally-deployable, AI-assisted pentest platform</text>
</svg>
