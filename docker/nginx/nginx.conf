# Adeptus edge: terminates TLS and serves the SPA, proxying the API same-origin.
# Same-origin (SPA + /api on one host) is what makes the SameSite=Lax session
# cookie work without CORS or a CSRF token (see ADR-0007).

# Redirect plain HTTP to HTTPS so the Secure session cookie is always usable.
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/adeptus.crt;
    ssl_certificate_key /etc/nginx/certs/adeptus.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Defense-in-depth response headers. HSTS is intentionally NOT set here: with a
    # self-signed dev cert it would pin browsers to a cert they distrust and break on
    # rotation. Enabling HSTS belongs with the real-cert swap in Slice 39.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # API → FastAPI. Trailing-slash-preserving proxy_pass (no path rewrite) so
    # /api/v1/... reaches the backend unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        root      /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
