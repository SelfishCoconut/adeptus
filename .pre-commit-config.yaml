repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^docs/requirements\.md$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|mcp-servers)/
      - id: ruff-format
        files: ^(backend|mcp-servers)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        name: mypy (backend)
        files: ^backend/app/
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - pyyaml
          - types-PyYAML
      - id: mypy
        name: mypy (mcp-servers)
        # Standalone stdlib-only subprocesses — no third-party stubs needed.
        files: ^mcp-servers/.*\.py$
        args: [--config-file=mcp-servers/pyproject.toml]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: frontend-lint
        name: ESLint (frontend)
        entry: bash -c "cd frontend && pnpm lint"
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: TypeScript (frontend)
        entry: bash -c "cd frontend && pnpm tsc --noEmit"
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: conventional-commits
        name: Conventional Commits message check
        entry: .git-hooks/check-commit-msg.sh
        language: script
        stages: [commit-msg]
