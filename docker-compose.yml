services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: adeptus
      POSTGRES_USER: adeptus
      POSTGRES_PASSWORD: adeptus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adeptus -d adeptus"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # NOTE: the argon2 hash in .env must escape each '$' as '$$' or Compose expands
    # the segments as variables and mangles the admin password hash. See .env.example.
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://adeptus:adeptus@postgres:5432/adeptus
      MCP_CONFIG_PATH: /etc/adeptus/mcp.yaml
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Anonymous volume masks the in-image .venv so the container never writes its
      # (root-owned, container-specific) virtualenv back onto the host bind mount.
      - /app/.venv
      # MCP config file — registry.py reads MCP_CONFIG_PATH at startup.
      - ./mcp-servers/config/mcp.yaml:/etc/adeptus/mcp.yaml:ro
      # MCP server scripts — server.py is invoked as python /mcp-servers/shell-exec/server.py.
      - ./mcp-servers:/mcp-servers:ro
    # Bind to loopback only: all external traffic must go through the TLS edge
    # (web) on 443. Exposing 8000 on 0.0.0.0 would let the LAN reach the plaintext
    # API directly, bypassing TLS. 127.0.0.1 keeps host-side tooling working.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
