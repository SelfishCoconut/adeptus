# Adeptus MCP server registry
# Loaded by backend/app/features/mcp/registry.py at startup (MCP_CONFIG_PATH).
# Each server entry requires: name, command, tools[].
# Each tool entry requires: name, weight (light|heavy), capability_flags (list).

servers:
  - name: shell-exec
    command: python
    args:
      - /mcp-servers/shell-exec/server.py
    tools:
      - name: run_command
        weight: light
        capability_flags:
          - shell-exec
          - filesystem-write
          - network

  - name: httpx
    command: python
    args:
      - /mcp-servers/httpx/server.py
    tools:
      - name: run_httpx
        weight: light
        capability_flags:
          - network
        presets:
          - name: quick
            description: Fetch status code and page title only
            args: {flags: ["-sc", "-title"]}
          - name: full
            description: Status code, title, tech detection, and follow redirects
            args: {flags: ["-sc", "-title", "-tech-detect", "-follow-redirects"]}
        arg_schema:
          type: object
          required: [target]
          properties:
            target: {type: string, title: Target URL}
            flags: {type: array, items: {type: string}, title: Extra flags}
            timeout_seconds: {type: integer, minimum: 1, maximum: 300, default: 30, title: Timeout (s)}

      - name: run_httpx_heavy
        weight: heavy
        capability_flags:
          - network
        arg_schema:
          type: object
          required: [target]
          properties:
            target: {type: string, title: Target URL}
            hold_seconds: {type: number, minimum: 1, maximum: 30, default: 2, title: Hold duration (s)}

  - name: nmap
    command: python
    args:
      - /mcp-servers/nmap/server.py
    tools:
      - name: run_nmap
        weight: heavy
        capability_flags:
          - network
        presets:
          - name: stealth
            description: Slow top-100 TCP connect scan, no host discovery
            args: {flags: ["-Pn", "-sT", "-T2", "--top-ports", "100"]}
          - name: normal
            description: Top-1000 TCP connect scan
            args: {flags: ["-Pn", "-sT", "-T3", "--top-ports", "1000"]}
          - name: aggressive
            description: Top-1000 TCP connect scan with service/version detection
            args: {flags: ["-Pn", "-sT", "-sV", "-T4", "--top-ports", "1000"]}
        arg_schema:
          type: object
          required: [target]
          properties:
            target: {type: string, title: Target host or URL}
            flags: {type: array, items: {type: string}, title: Extra flags}
            timeout_seconds: {type: integer, minimum: 1, maximum: 600, default: 120, title: Timeout (s)}
