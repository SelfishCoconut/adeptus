name: ci

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adeptus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev
        working-directory: backend

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: backend

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: backend

      - name: Mypy
        run: uv run mypy app/
        working-directory: backend

      - name: Alembic upgrade
        run: uv run alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/adeptus_test
          # Required by the Settings model at import time; unused by migrations.
          ADEPTUS_ADMIN_USER: admin
          ADEPTUS_ADMIN_PASSWORD_HASH: "$argon2id$v=19$m=65536,t=3,p=4$hash"

      - name: Pytest with coverage gate
        run: uv run pytest --cov=app/features --cov-fail-under=80 --cov-report=xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/adeptus_test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  mcp-servers:
    name: MCP servers (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev
        working-directory: mcp-servers

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: mcp-servers

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: mcp-servers

      # Each MCP server is an independent tree with its own top-level server.py
      # and tests/ package; a single mypy/pytest pass over all of them collides
      # on the duplicate module names. Run one pass per server (mirrors the
      # Makefile lint / test-mcp-servers targets).
      - name: Mypy (per server)
        run: for d in */server.py; do uv run mypy "$(dirname "$d")" || exit 1; done
        working-directory: mcp-servers

      - name: Pytest with coverage gate (per server)
        run: for d in */server.py; do s="$(dirname "$d")"; uv run pytest "$s" --cov="$s" --cov-fail-under=80 || exit 1; done
        working-directory: mcp-servers

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: ESLint
        run: pnpm lint
        working-directory: frontend

      - name: TypeScript
        run: pnpm tsc --noEmit
        working-directory: frontend

      - name: Vitest with coverage gate
        run: pnpm test -- --run --coverage
        working-directory: frontend

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium
        working-directory: frontend

      - name: Playwright E2E
        run: pnpm playwright test
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
